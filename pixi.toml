[workspace]
name = "zeptocode-cli"
version = "0.1.0"
description = "ZeptoCodeCLI: a Go/BubbleTea TUI frontend for Letta Code, speaking the app-server protocol"
channels = ["conda-forge"]
platforms = ["linux-64", "win-64"]

[activation.env]
# Pure-Go project; conda-forge's go otherwise demands the conda C toolchain.
CGO_ENABLED = "0"

[dependencies]
go = ">=1.23"
nushell = "*"
uutils-coreutils = "*"

[tasks]
# The TUI: pixi run zc -- [--agent <agent-id>] [--conversation <id|new>]
zc = "go run ./cmd/zc"
tidy = "go mod tidy"
build = "go build ./..."
vet = "go vet ./..."
# Headless lobby -> chat round-trip against a real ui-server (drives one turn,
# prints decoded frame types). Optionally ZC_SMOKE_AGENT / ZC_SMOKE_CONVERSATION.
smoke = "go run ./cmd/stdio-smoke"
